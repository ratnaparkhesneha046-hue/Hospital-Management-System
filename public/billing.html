<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Billing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; }
    .navbar { background: #2c3e50; color: white; padding: 15px 30px; font-size: 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
    .navbar a { color: white; text-decoration: none; font-size: 14px; }
    .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
    .card { background: white; border-radius: 10px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { color: #2c3e50; margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: #555; font-size: 14px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    button { background: #e74c3c; color: white; padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; }
    button:hover { background: #c0392b; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #2c3e50; color: white; padding: 12px; text-align: left; }
    td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 14px; }
    tr:hover { background: #f9f9f9; }
    .btn-delete { background: #e74c3c; color: white; padding: 5px 12px; font-size: 13px; border-radius: 4px; border: none; cursor: pointer; }
    .paid { color: green; font-weight: bold; }
    .pending { color: orange; font-weight: bold; }
    .msg { padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; }
    .success { background: #d4edda; color: #155724; display: block; }
    .error { background: #f8d7da; color: #721c24; display: block; }
  </style>
</head>
<body>
  <div class="navbar">🏥 Hospital Management <a href="/">← Dashboard</a></div>
  <div class="container">
    <div class="card">
      <h2>Add Bill</h2>
      <div id="msg" class="msg"></div>
      <div class="form-row">
        <div class="form-group"><label>Patient</label>
          <select id="patient_id"><option value="">Select Patient</option></select>
        </div>
        <div class="form-group"><label>Amount (₹)</label><input type="number" id="amount" placeholder="Enter amount" /></div>
      </div>
      <div class="form-group"><label>Bill Date</label><input type="date" id="bill_date" /></div>
      <button onclick="addBill()">+ Add Bill</button>
    </div>
    <div class="card">
      <h2>All Bills</h2>
      <table>
        <thead><tr><th>ID</th><th>Patient</th><th>Amount</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
        <tbody id="billingTable"><tr><td colspan="6" style="text-align:center">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
  <script>
    async function loadPatients() {
      const patients = await fetch('/patients').then(r => r.json());
      document.getElementById('patient_id').innerHTML = '<option value="">Select Patient</option>' + patients.map(p => `<option value="${p.patient_id}">${p.name}</option>`).join('');
    }
    async function loadBilling() {
      const res = await fetch('/billing');
      const data = await res.json();
      const tbody = document.getElementById('billingTable');
      if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No bills found</td></tr>'; return; }
      tbody.innerHTML = data.map(b => `<tr><td>${b.bill_id}</td><td>${b.patient}</td><td>₹${b.amount}</td><td class="${b.payment_status.toLowerCase()}">${b.payment_status}</td><td>${b.bill_date?.split('T')[0]}</td><td><button class="btn-delete" onclick="deleteBill(${b.bill_id})">Delete</button></td></tr>`).join('');
    }
    async function addBill() {
      const patient_id = document.getElementById('patient_id').value;
      const amount = document.getElementById('amount').value;
      const bill_date = document.getElementById('bill_date').value;
      const msg = document.getElementById('msg');
      if (!patient_id || !amount || !bill_date) { msg.className = 'msg error'; msg.textContent = '❌ Fill all fields!'; return; }
      await fetch('/billing/add', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ patient_id, amount, bill_date }) });
      msg.className = 'msg success'; msg.textContent = '✅ Bill added!';
      loadBilling();
    }
    async function deleteBill(id) {
      if (!confirm('Delete this bill?')) return;
      await fetch(`/billing/delete/${id}`, { method: 'DELETE' });
      loadBilling();
    }
    loadPatients();
    loadBilling();
  </script>
</body>
</html>

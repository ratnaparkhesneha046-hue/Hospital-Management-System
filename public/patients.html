<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patients</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; }
    .navbar { background: #2c3e50; color: white; padding: 15px 30px; font-size: 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
    .navbar a { color: white; text-decoration: none; font-size: 14px; }
    .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
    .card { background: white; border-radius: 10px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { color: #2c3e50; margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: #555; font-size: 14px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    button { background: #3498db; color: white; padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; }
    button:hover { background: #2980b9; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #2c3e50; color: white; padding: 12px; text-align: left; }
    td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 14px; }
    tr:hover { background: #f9f9f9; }
    .btn-delete { background: #e74c3c; padding: 5px 12px; font-size: 13px; border-radius: 4px; }
    .btn-delete:hover { background: #c0392b; }
    .msg { padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; }
    .success { background: #d4edda; color: #155724; display: block; }
    .error { background: #f8d7da; color: #721c24; display: block; }
  </style>
</head>
<body>
  <div class="navbar">🏥 Hospital Management <a href="/">← Dashboard</a></div>
  <div class="container">
    <div class="card">
      <h2>Add New Patient</h2>
      <div id="msg" class="msg"></div>
      <div class="form-row">
        <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Patient name" /></div>
        <div class="form-group"><label>Age</label><input type="number" id="age" placeholder="Age" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Gender</label>
          <select id="gender"><option value="">Select Gender</option><option>Male</option><option>Female</option><option>Other</option></select>
        </div>
        <div class="form-group"><label>Phone</label><input type="text" id="phone" placeholder="Phone number" /></div>
      </div>
      <div class="form-group"><label>Address</label><input type="text" id="address" placeholder="Address" /></div>
      <button onclick="addPatient()">+ Add Patient</button>
    </div>
    <div class="card">
      <h2>All Patients</h2>
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Age</th><th>Gender</th><th>Phone</th><th>Address</th><th>Action</th></tr></thead>
        <tbody id="patientTable"><tr><td colspan="7" style="text-align:center">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
  <script>
    async function loadPatients() {
      const res = await fetch('/patients');
      const data = await res.json();
      const tbody = document.getElementById('patientTable');
      if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">No patients found</td></tr>'; return; }
      tbody.innerHTML = data.map(p => `<tr><td>${p.patient_id}</td><td>${p.name}</td><td>${p.age}</td><td>${p.gender}</td><td>${p.phone}</td><td>${p.address}</td><td><button class="btn-delete" onclick="deletePatient(${p.patient_id})">Delete</button></td></tr>`).join('');
    }
    async function addPatient() {
      const name = document.getElementById('name').value;
      const age = document.getElementById('age').value;
      const gender = document.getElementById('gender').value;
      const phone = document.getElementById('phone').value;
      const address = document.getElementById('address').value;
      const msg = document.getElementById('msg');
      if (!name || !age || !gender || !phone) { msg.className = 'msg error'; msg.textContent = '❌ Fill all fields!'; return; }
      await fetch('/patients/add', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, age, gender, phone, address }) });
      msg.className = 'msg success'; msg.textContent = '✅ Patient added!';
      loadPatients();
    }
    async function deletePatient(id) {
      if (!confirm('Delete this patient?')) return;
      await fetch(`/patients/delete/${id}`, { method: 'DELETE' });
      loadPatients();
    }
    loadPatients();
  </script>
</body>
</html>

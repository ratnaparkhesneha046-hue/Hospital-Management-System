<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital Management System</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3') no-repeat center center/cover;
      min-height: 100vh;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }

    .navbar {
      background: rgba(44, 62, 80, 0.9);
      color: white;
      padding: 15px 30px;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h2 {
      color: white;
      margin-bottom: 25px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255,255,255,0.9);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .stat-card h3 {
      font-size: 28px;
      color: #2c3e50;
    }

    .stat-card p {
      color: #777;
      font-size: 13px;
      margin-top: 5px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      text-decoration: none;
      color: #2c3e50;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card .icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .card h3 {
      font-size: 20px;
    }

    .card p {
      color: #777;
      margin-top: 8px;
      font-size: 14px;
    }

    .card.blue { border-top: 5px solid #3498db; }
    .card.green { border-top: 5px solid #2ecc71; }
    .card.orange { border-top: 5px solid #e67e22; }
    .card.red { border-top: 5px solid #e74c3c; }

  </style>
</head>

<body>

  <div class="overlay"></div>

  <div class="navbar">🏥 Hospital Management System</div>

  <div class="container">

    <div class="stats">
      <div class="stat-card"><h3 id="totalPatients">...</h3><p>Total Patients</p></div>
      <div class="stat-card"><h3 id="totalDoctors">...</h3><p>Total Doctors</p></div>
      <div class="stat-card"><h3 id="totalAppointments">...</h3><p>Appointments</p></div>
      <div class="stat-card"><h3 id="totalBills">...</h3><p>Bills</p></div>
    </div>

    <h2>Dashboard</h2>

    <div class="cards">
      <a href="patients.html" class="card blue">
        <div class="icon">🧑‍⚕️</div>
        <h3>Patients</h3>
        <p>Add and view patient records</p>
      </a>

      <a href="doctors.html" class="card green">
        <div class="icon">👨‍⚕️</div>
        <h3>Doctors</h3>
        <p>Manage doctor information</p>
      </a>

      <a href="appointments.html" class="card orange">
        <div class="icon">📅</div>
        <h3>Appointments</h3>
        <p>Book and track appointments</p>
      </a>

      <a href="billing.html" class="card red">
        <div class="icon">💰</div>
        <h3>Billing</h3>
        <p>Manage patient bills</p>
      </a>
    </div>

  </div>

  <script>
    async function loadStats() {
      const [patients, doctors, appointments, billing] = await Promise.all([
        fetch('/patients').then(r => r.json()),
        fetch('/doctors').then(r => r.json()),
        fetch('/appointments').then(r => r.json()),
        fetch('/billing').then(r => r.json())
      ]);

      document.getElementById('totalPatients').textContent = patients.length;
      document.getElementById('totalDoctors').textContent = doctors.length;
      document.getElementById('totalAppointments').textContent = appointments.length;
      document.getElementById('totalBills').textContent = billing.length;
    }

    loadStats();
  </script>

</body>
</html>
